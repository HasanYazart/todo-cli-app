<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        ul {
            list-style: none;
        }

        li {
            background: #f7f7f7;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done {
            text-decoration: line-through;
            opacity: 0.6;
        }

        a {
            text-decoration: none;
            color: #667eea;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Todo App</h1>

    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Yeni görev..." required>
        <button type="submit">Ekle</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                <span class="{% if task.done %}done{% endif %}">
                    {% if task.done %}✔️{% else %}❌{% endif %}
                    {{ task.task }}
                </span>

                {% if not task.done %}
                    <a href="/done/{{ task.id }}">Tamamla</a>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
