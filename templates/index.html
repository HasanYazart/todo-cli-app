<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* Renkler */
:root {
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0b1120;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
    --primary: #3b82f6;
    --success: #10b981;
    --danger: #ef4444;
}

/* Genel */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
.container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

/* Başlık */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
.header h2 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.logout-btn { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
.logout-btn:hover { color: var(--danger); }

/* Kart */
.card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 24px; transition: opacity 0.3s ease, transform 0.3s ease; }

/* Formlar */
.add-form { display: flex; gap: 12px; flex-wrap: wrap; }
.add-form input { flex: 1; min-width: 150px; }
input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px; border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; }
input:focus { border-color: var(--primary); }

/* Butonlar */
button, .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-dark { background: var(--bg-dark); color: white; border: 1px solid var(--border-color); }

/* Görevler */
.task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.task-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.badges { display: flex; gap: 10px; font-size: 12px; flex-wrap: wrap; }
.badge { background: var(--bg-dark); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color); color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

/* İkonlar */
.task-actions { display: flex; gap: 8px; }
.icon-btn { background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-color); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.icon-btn:hover { color: white; }
.icon-btn.check:hover { background: var(--success); border-color: var(--success); }
.icon-btn.trash:hover { background: var(--danger); border-color: var(--danger); }
.icon-btn.edit:hover { background: var(--primary); border-color: var(--primary); }

/* İlerleme */
.progress-container { margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.progress-bar { height: 8px; background: var(--bg-dark); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: 0.4s ease; }

/* Altgörevler */
.subtasks { background: var(--bg-dark); padding: 16px; border-radius: 8px; }
.subtask-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.subtask-item:last-child { border-bottom: none; }
.subtask-btn { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0; }
.subtask-text { font-size: 14px; flex: 1; transition: 0.3s; }
.subtask-text.done { text-decoration: line-through; color: var(--text-muted); }
.add-subtask-form { display: flex; margin-top: 16px; }
.add-subtask-form input { flex: 1; border-radius: 8px 0 0 8px; border-right: none; }
.add-subtask-form button { border-radius: 0 8px 8px 0; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); }

/* Filtreler */
.filters { display: flex; gap: 10px; margin-bottom: 20px; }
.filter-btn { background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 14px; }
.filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

/* Pomodoro */
.pomodoro-card { text-align: center; }
.timer { font-size: 64px; font-weight: 700; font-variant-numeric: tabular-nums; margin: 10px 0; color: var(--primary); text-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
.pomodoro-controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;}
</style>
</head>

<body>

<div class="container">

    <!-- Üstbar -->
    <div class="header">
        <h2><i class="fa-solid fa-rocket" style="color: var(--primary);"></i> Dashboard</h2>
        <a href="/logout" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap</a>
    </div>

    <!-- Ekle -->
    <div class="card">
        <form action="/add" method="post" class="add-form">
            <input name="task" placeholder="Ne yapılması gerekiyor?" required>
            <input name="category" placeholder="Kategori">
            <input type="date" name="deadline">
            <button class="btn-success"><i class="fa-solid fa-plus"></i> Ekle</button>
        </form>
    </div>

    <!-- Filtreler -->
    <div class="filters">
        <button onclick="filterTasks('all', this)" class="filter-btn active">Tümü</button>
        <button onclick="filterTasks('todo', this)" class="filter-btn">Kalanlar</button>
        <button onclick="filterTasks('done', this)" class="filter-btn">Bitenler</button>
    </div>

    <!-- Listele -->
    {% for x in tasks %}
    <div class="card task-card" id="task-card-{{x.task.id}}" data-done="{{x.task.done}}">
        
        <div class="task-header">
            <div>
                <div class="task-title">{{x.task.task}}</div>
                <div class="badges">
                    {% if x.task.category %}<span class="badge"><i class="fa-solid fa-tag"></i> {{x.task.category}}</span>{% endif %}
                    {% if x.task.deadline %}<span class="badge"><i class="fa-regular fa-calendar"></i> {{x.task.deadline}} ({{x.rem}})</span>{% endif %}
                </div>
            </div>
            
            <div class="task-actions">
                <button onclick="toggleMainTask({{x.task.id}})" class="icon-btn check" id="btn-main-{{x.task.id}}" style="{% if x.task.done==1 %}background: var(--success); border-color: var(--success); color: white;{% endif %}"><i class="fa-solid fa-check"></i></button>
                <button onclick="document.getElementById('edit-form-{{x.task.id}}').style.display = document.getElementById('edit-form-{{x.task.id}}').style.display === 'none' ? 'flex' : 'none';" class="icon-btn edit"><i class="fa-solid fa-pen"></i></button>
                <button onclick="deleteTask({{x.task.id}})" class="icon-btn trash"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <!-- Düzenle -->
        <form action="/edit/{{x.task.id}}" method="post" class="add-form" id="edit-form-{{x.task.id}}" style="display:none; margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border-color);">
            <input name="task" value="{{x.task.task}}" required>
            <input name="category" value="{{x.task.category}}">
            <input type="date" name="deadline" value="{{x.task.deadline}}">
            <button class="btn-primary"><i class="fa-solid fa-save"></i> Kaydet</button>
        </form>

        <!-- İlerleme -->
        <div class="progress-container">
            <div class="progress-header">
                <span>İlerleme</span>
                <span id="progress-text-{{x.task.id}}">%{{x.p}}</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill-{{x.task.id}}" style="width:{{x.p}}%; {% if x.p == 100 %}background-color: var(--success);{% endif %}"></div>
            </div>
        </div>

        <!-- Altgörevler -->
        <div class="subtasks">
            {% for s in x.subs %}
            <div class="subtask-item">
                <button onclick="toggleSubtask({{s.id}}, {{x.task.id}})" class="subtask-btn" id="sub-btn-{{s.id}}">
                    {% if s.done==1 %}<i class="fa-solid fa-circle-check" style="color: var(--success);"></i>
                    {% else %}<i class="fa-regular fa-circle"></i>{% endif %}
                </button>
                <span class="subtask-text {% if s.done==1 %}done{% endif %}" id="sub-text-{{s.id}}">{{s.text}}</span>
            </div>
            {% endfor %}

            <form action="/add_sub/{{x.task.id}}" method="post" class="add-subtask-form">
                <input name="text" placeholder="Yeni alt görev..." required>
                <button type="submit"><i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>

    </div>
    {% endfor %}

    <!-- Pomodoro -->
    <div class="card pomodoro-card">
        <h3><i class="fa-solid fa-stopwatch" style="color: var(--text-muted);"></i> Odaklanma Zamanı</h3>
        <div style="margin-top:10px;">
            <button onclick="setTime(25)" class="btn btn-dark">25dk</button>
            <button onclick="setTime(15)" class="btn btn-dark">15dk</button>
            <button onclick="setTime(5)" class="btn btn-dark">5dk</button>
        </div>
        <div id="timer" class="timer">25:00</div>
        <div class="pomodoro-controls">
            <button onclick="start()" class="btn-primary"><i class="fa-solid fa-play"></i> Başlat</button>
            <button onclick="pause()" class="btn btn-dark"><i class="fa-solid fa-pause"></i> Durdur</button>
            <button onclick="reset()" class="btn-danger"><i class="fa-solid fa-rotate-left"></i> Sıfırla</button>
        </div>
    </div>

</div>

<!-- Zil -->
<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>
// Pomodoro
let t = 1500, i;
function upd() { 
    let m = Math.floor(t/60), s = t%60; 
    document.getElementById("timer").innerText = m + ":" + ("0"+s).slice(-2); 
}
function setTime(m) { t = m * 60; upd(); pause(); }
function start() { 
    if(i) return; 
    i = setInterval(() => { 
        t--; upd(); 
        if(t <= 0) { clearInterval(i); document.getElementById("sound").play(); alert("Süre Doldu!"); reset(); } 
    }, 1000); 
}
function pause() { clearInterval(i); i = null; }
function reset() { pause(); t = 1500; upd(); }
upd();

// AJAX-Sil
async function deleteTask(taskId) {
    if(!confirm("Silinsin mi?")) return;
    const res = await fetch(`/api/delete/${taskId}`, { method: 'POST' });
    if((await res.json()).status === "success") {
        const card = document.getElementById(`task-card-${taskId}`);
        card.style.transform = "scale(0.9)";
        card.style.opacity = "0";
        setTimeout(() => card.remove(), 300);
    }
}

// AJAX-AnaDurum
async function toggleMainTask(taskId) {
    const res = await fetch(`/api/done/${taskId}`, { method: 'POST' });
    const data = await res.json();
    if(data.status === "success") {
        const btn = document.getElementById(`btn-main-${taskId}`);
        const card = document.getElementById(`task-card-${taskId}`);
        card.setAttribute("data-done", data.is_done ? "1" : "0"); // Filtre için
        
        if(data.is_done) {
            btn.style.background = "var(--success)"; btn.style.borderColor = "var(--success)"; btn.style.color = "white";
        } else {
            btn.style.background = "var(--bg-dark)"; btn.style.borderColor = "var(--border-color)"; btn.style.color = "var(--text-muted)";
        }
    }
}

// AJAX-Altdurum
async function toggleSubtask(subId, taskId) {
    const res = await fetch(`/api/toggle/${subId}`, { method: 'POST' });
    const data = await res.json();
    if(data.status === "success") {
        const btn = document.getElementById(`sub-btn-${subId}`), text = document.getElementById(`sub-text-${subId}`);
        const pFill = document.getElementById(`progress-fill-${taskId}`), pText = document.getElementById(`progress-text-${taskId}`);
        
        if(data.is_done) { btn.innerHTML = '<i class="fa-solid fa-circle-check" style="color: var(--success);"></i>'; text.classList.add("done"); }
        else { btn.innerHTML = '<i class="fa-regular fa-circle"></i>'; text.classList.remove("done"); }

        pFill.style.width = `${data.percent}%`; pText.innerText = `%${data.percent}`;
        pFill.style.backgroundColor = data.percent === 100 ? "var(--success)" : "var(--primary)";
    }
}

// Filtre
function filterTasks(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.querySelectorAll('.task-card').forEach(card => {
        let isDone = card.getAttribute('data-done') === '1';
        if(type === 'all') card.style.display = 'block';
        else if(type === 'todo') card.style.display = isDone ? 'none' : 'block';
        else if(type === 'done') card.style.display = isDone ? 'block' : 'none';
    });
}
</script>

</body>
</html>
