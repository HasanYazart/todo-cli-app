<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilim | To Do App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.profile-card { max-width: 540px; margin: 0 auto 20px auto; text-align: center; }
.avatar { width: 80px; height: 80px; background: var(--gradient-1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
.username { font-size: 24px; font-weight: 700; margin-bottom: 30px; }
.form-group { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 20px; }
.form-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.form-group input, .form-group select { width: 100%; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; }
.btn-block { width: 100%; }
.section-title { text-align: left; font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text-main); border-bottom: 1px solid var(--bg-card-border); padding-bottom: 10px; display: flex; align-items: center; gap: 8px;}
@media (max-width: 500px) { .action-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body class="{% if user.theme == 'light' %}theme-light{% endif %}">

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="header-logo" style="cursor:pointer;" onclick="window.location='/'"><i class="fa-solid fa-arrow-left"></i></div>
            <h1>Profil ve Ayarlar</h1>
        </div>
        <a href="/" class="logout-btn"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
    </div>

    <!-- Ayarlar -->
    <div class="card profile-card">
        <div class="section-title"><i class="fa-solid fa-gear"></i> Uygulama Ayarları</div>
        <form id="settings-form" onsubmit="saveSettings(event)" enctype="multipart/form-data">
            <div class="form-group">
                <label>Tema</label>
                <select name="theme">
                    <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Karanlık</option>
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Aydınlık</option>
                </select>
            </div>
            <div class="form-group">
                <label>Varsayılan Pomodoro Süresi (dk)</label>
                <select name="pomodoro_time">
                    <option value="15" {% if user.pomodoro_time == 15 %}selected{% endif %}>15 Dakika</option>
                    <option value="25" {% if user.pomodoro_time == 25 %}selected{% endif %}>25 Dakika (Varsayılan)</option>
                    <option value="30" {% if user.pomodoro_time == 30 %}selected{% endif %}>30 Dakika</option>
                    <option value="45" {% if user.pomodoro_time == 45 %}selected{% endif %}>45 Dakika</option>
                    <option value="60" {% if user.pomodoro_time == 60 %}selected{% endif %}>60 Dakika</option>
                </select>
            </div>
            <div class="form-group">
                <label>Pomodoro Zil Sesi</label>
                <div style="display:flex; gap:10px;">
                    <select name="pomodoro_sound" id="pomodoro_sound" onchange="checkCustomSound()" style="flex:1;">
                        <option value="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" {% if user.pomodoro_sound == 'https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg' %}selected{% endif %}>Çalar Saat (Varsayılan)</option>
                        <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" {% if user.pomodoro_sound == 'https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg' %}selected{% endif %}>Dijital Saat</option>
                        <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" {% if user.pomodoro_sound == 'https://actions.google.com/sounds/v1/alarms/beep_short.ogg' %}selected{% endif %}>Kısa Bip</option>
                        <option value="custom" {% if not user.pomodoro_sound.startswith('http') %}selected{% endif %}>Özel (Bilgisayardan Yükle)</option>
                    </select>
                    <button type="button" class="btn btn-dark" onclick="testSound()" title="Sesi Test Et"><i class="fa-solid fa-play"></i></button>
                </div>
            </div>
            <div class="form-group" id="custom_sound_group" style="{% if user.pomodoro_sound.startswith('http') %}display:none;{% endif %}">
                <label>Kendi Zil Sesiniz (Sadece MP3, OGG, WAV - Maks 2MB)</label>
                <input type="file" name="sound_file" accept=".mp3,.ogg,.wav">
                {% if not user.pomodoro_sound.startswith('http') %}
                <small style="color:var(--text-muted); margin-top:5px;">Mevcut Özel Ses Yüklü.</small>
                {% endif %}
            </div>
            
            <button class="btn-primary btn-block" type="submit" style="margin-top:10px;"><i class="fa-solid fa-save"></i> Ayarları Kaydet</button>
        </form>
    </div>

    <!-- Profil Bilgileri -->
    <div class="card profile-card">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <div class="username">{{ user.username }}</div>

        <div class="section-title"><i class="fa-solid fa-lock"></i> Şifre Değiştir</div>
        <form id="password-form" onsubmit="updatePassword(event)">
            <div class="form-group">
                <input type="password" name="old_p" placeholder="Mevcut şifreniz" required>
            </div>
            <div class="form-group">
                <input type="password" name="new_p" placeholder="Yeni şifreniz" required>
            </div>
            <button class="btn-primary btn-block" type="submit"><i class="fa-solid fa-key"></i> Şifreyi Güncelle</button>
        </form>

        <div class="action-grid">
            <a href="/profile/export" class="btn btn-dark"><i class="fa-solid fa-download"></i> Verilerimi İndir</a>
            <button onclick="deleteAccount()" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> Hesabımı Sil</button>
        </div>
    </div>
</div>

<audio id="test-audio"></audio>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<script>
function checkCustomSound() {
    const val = document.getElementById('pomodoro_sound').value;
    document.getElementById('custom_sound_group').style.display = (val === 'custom') ? 'flex' : 'none';
}

function testSound() {
    const val = document.getElementById('pomodoro_sound').value;
    const player = document.getElementById('test-audio');
    if (val === 'custom') {
        const fileInput = document.querySelector('input[name="sound_file"]');
        if (fileInput.files.length > 0) {
            player.src = URL.createObjectURL(fileInput.files[0]);
            player.play();
        } else {
            {% if not user.pomodoro_sound.startswith('http') %}
            player.src = "{{ user.pomodoro_sound }}";
            player.play();
            {% else %}
            Swal.fire({icon: 'info', title:'Dosya Seçilmedi', text:'Lütfen önce bir ses dosyası seçin.', background: 'var(--bg-card)', color: 'var(--text-main)'});
            {% endif %}
        }
    } else {
        player.src = val;
        player.play();
    }
}

async function saveSettings(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    
    // File size check (2MB)
    const file = formData.get("sound_file");
    if(file && file.size > 2097152) {
        Swal.fire({icon: 'error', title:'Hata', text:'Dosya boyutu 2MB dan küçük olmalıdır.', background: 'var(--bg-card)', color: 'var(--text-main)'});
        return;
    }
    
    const res = await fetch('/profile/settings', {
        method: 'POST',
        body: formData
    });
    const data = await res.json();
    
    Swal.fire({
        title: data.status === 'success' ? 'Başarılı!' : 'Hata!',
        text: data.message,
        icon: data.status,
        background: 'var(--bg-card)',
        color: 'var(--text-main)',
        confirmButtonColor: 'var(--accent-1)'
    }).then(() => {
        if(data.status === 'success') location.reload();
    });
}

async function updatePassword(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    
    const res = await fetch('/profile/password', {
        method: 'POST',
        body: formData
    });
    const data = await res.json();
    
    Swal.fire({
        title: data.status === 'success' ? 'Başarılı!' : 'Hata!',
        text: data.message,
        icon: data.status,
        background: 'var(--bg-card)',
        color: 'var(--text-main)',
        confirmButtonColor: 'var(--accent-1)'
    });
    
    if(data.status === 'success') {
        form.reset();
    }
}

async function deleteAccount() {
    const result = await Swal.fire({
        title: 'Çok Tehlikeli İşlem!',
        text: "Tüm görevleriniz ve hesabınız kalıcı olarak silinecek. Emin misiniz?",
        icon: 'error',
        showCancelButton: true,
        confirmButtonColor: 'var(--danger)',
        cancelButtonColor: 'var(--bg-card-solid)',
        confirmButtonText: 'Evet, Hesabımı Sil',
        cancelButtonText: 'İptal',
        background: 'var(--bg-card)',
        color: 'var(--text-main)'
    });
    
    if (result.isConfirmed) {
        const res = await fetch('/profile/delete', { method: 'POST' });
        if((await res.json()).status === "success") {
            window.location = '/login';
        }
    }
}
</script>
</body>
</html>
