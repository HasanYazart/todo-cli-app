<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayıt Ol | To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0b1120;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }

.auth-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
.auth-card h2 { margin-bottom: 24px; font-weight: 700; color: white; display: flex; justify-content: center; align-items: center; gap: 10px; }

.input-group { position: relative; margin-bottom: 16px; text-align: left; }
.input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.input-group input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px 12px 40px; border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: 0.2s; }
.input-group input:focus { border-color: var(--primary); }

.btn-primary { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; margin-top: 8px; font-family: inherit; }
.btn-primary:hover { background: var(--primary-hover); }

.link { margin-top: 20px; font-size: 14px; color: var(--text-muted); }
.link a { color: var(--primary); text-decoration: none; font-weight: 500; }
.link a:hover { text-decoration: underline; }

.flash { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
</style>
</head>
<body>

<div class="auth-card">
    <h2><i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> Yeni Hesap</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post">
        <div class="input-group">
            <i class="fa-regular fa-user"></i>
            <input name="u" placeholder="Kullanıcı adı seç" required>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input name="p" type="password" placeholder="Şifre belirle" required>
        </div>
        <button class="btn-primary">Kayıt Ol</button>
    </form>

    <div class="link">
        Zaten hesabın var mı? <a href="/login">Giriş Yap</a>
    </div>
</div>

</body>
</html>
